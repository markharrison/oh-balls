<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh Balls 2 - Physics Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="ui-header">
            <h1>OH BALLS</h1>
            <div class="controls">
                <span>← → Move • Space Drop</span>
            </div>
        </div>
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        
        <!-- Settings HTML Overlay -->
        <div id="settingsOverlay" class="settings-overlay" style="display: none;">
            <div class="settings-content">
                <h1 class="settings-title">SETTINGS</h1>
                <div class="settings-options">
                    <div class="setting-option" data-option="0">
                        <span class="option-label">Sound:</span>
                        <span class="option-value" id="soundValue">ON</span>
                    </div>
                    <div class="setting-option" data-option="1">
                        <span class="option-label">Difficulty:</span>
                        <span class="option-value" id="difficultyValue">Medium</span>
                    </div>
                    <div class="setting-option" data-option="2">
                        <span class="option-label">Graphics:</span>
                        <span class="option-value" id="graphicsValue">High</span>
                    </div>
                    <div class="setting-option" data-option="3">
                        <span class="option-label">Back:</span>
                        <span class="option-value"></span>
                    </div>
                </div>
                <div class="settings-instructions">
                    ↑ ↓ Navigate • ENTER Select • ESC Back
                </div>
            </div>
        </div>
        
        <div class="ui-footer">
            <div class="ball-info">
                <span id="currentBallSize">Next Ball: Size ?</span>
            </div>
        </div>
    </div>

    <script src="lib/planck.min.js"></script>
    
    <script type="module" src="js/screenmanager.js"></script>
    <script type="module" src="js/physics.js"></script>
    <script type="module" src="js/scenesplash.js"></script>
    <script type="module" src="js/scenemenu.js"></script>
    <script type="module" src="js/scenesettings.js"></script>
    <script type="module" src="js/sceneballsx.js"></script>
    <script type="module" src="js/ball.js"></script>
    <script type="module" src="js/input.js"></script>
    <script type="module" src="js/diagnostics.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
